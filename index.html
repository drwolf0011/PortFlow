
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PortFlow: AI 자산관리</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2632/2632283.png">
    
    <!-- Updated Tailwind CDN to include typography plugin for Markdown rendering -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            /* Disable tap highlight color on mobile */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7fb;
            /* Prevent bounce effect on mobile */
            overscroll-behavior-y: contain;
        }

        /* Custom scrollbar for mobile */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Safe Area Utilities */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .pt-safe {
            padding-top: env(safe-area-inset-top);
        }

        /* Custom Shadows */
        .shadow-top {
            box-shadow: 0 -4px 12px -2px rgba(0, 0, 0, 0.05);
        }

        /* Animation Keyframes for UI components */
        @keyframes enter {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Utility classes matching standard tailwind-animate plugin */
        .animate-in {
            animation-duration: 0.3s;
            animation-fill-mode: forwards;
            animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
        }
        .zoom-in-95 {
            animation-name: zoomIn;
        }
        .fade-in {
            animation-name: fadeIn;
        }
        .slide-in-from-bottom {
            animation-name: slideUp;
        }
        .slide-in-from-bottom-4 {
             animation-name: slideUp;
             /* Approximate small slide */
             --tw-enter-translate-y: 1rem;
        }
        .slide-in-from-top-2 {
            animation-name: slideDown;
        }
        .duration-200 { animation-duration: 0.2s; }
        .duration-300 { animation-duration: 0.3s; }
        .duration-500 { animation-duration: 0.5s; }
    </style>
<script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0",

    "recharts": "https://esm.sh/recharts@^3.6.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-markdown": "https://esm.sh/react-markdown@^9.0.0",
    "@capacitor/cli": "https://esm.sh/@capacitor/cli@^8.0.2",
    "@capacitor/core": "https://esm.sh/@capacitor/core@^8.1.0"
  }
}
</script>
</head>

    <div id="root"></div>
</body>
</html>
